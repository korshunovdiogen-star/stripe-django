version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: stripe_db
      POSTGRES_USER: stripe_user
      POSTGRES_PASSWORD: stripe_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stripe_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://stripe_user:stripe_password@db:5432/stripe_db
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media

volumes:
  postgres_data:
  static_volume:
  media_volume: